# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy PHP app to Azure Web App - laravelDeploy

on:
  push:
    branches:
      - develop
      - main # 🚀 Escucha ambas ramas indispensables de tu Git Flow
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read # This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Check if composer.json exists
        id: check_files
        uses: andstor/file-existence-action@v1
        with:
          files: 'composer.json'

      - name: Run composer install if composer.json exists
        if: steps.check_files.outputs.files_exists == 'true'
        run: composer validate --no-check-publish && composer install --prefer-dist --no-progress

      # 🧹 Eliminamos el .env local durante la compilación para que Azure no use credenciales locales
      - name: Clean environment files for production
        run: rm -f .env

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: php-app
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write # Requerido para solicitar el JWT de OIDC que pide el profe
      contents: read # Requerido para actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: php-app

      # 🔑 INICIO DE SESIÓN OFICIAL (Con el parche de audiencia global de Microsoft)
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_CFF0019D7EE84D65A1364FED6F6298A6 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_FB8DC05D4F7B4B239CEE85B6ADE3A56E }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_3106D9AB0E044B5F853577A7A7598360 }}
          audience: api://AzureADTokenExchange # 🌟 Fuerza el intercambio global saltando el bloqueo de ramas de la escuela

      # 🚀 DESPLIEGUE FINAL EN EL APP SERVICE
      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'laravelDeploy'
          slot-name: 'Production'
          package: .
          clean: true # 🛠️ Limpia archivos viejos para que no se congele el contenedor (Error 409)
